services:
  database:
    image: postgres:16-alpine
    container_name: buzzer_database
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-buzzer}
      POSTGRES_USER: ${POSTGRES_USER:-buzzer}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-buzzer}
    volumes:
      - database_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-buzzer} -d ${POSTGRES_DB:-buzzer}"]
      interval: 5s
      timeout: 5s
      retries: 10

  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    container_name: buzzer_php
    depends_on:
      database:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-buzzer}:${POSTGRES_PASSWORD:-buzzer}@database:5432/${POSTGRES_DB:-buzzer}?serverVersion=16&charset=utf8"
    volumes:
      - ./:/app:rw

  web:
    image: nginx:1.27-alpine
    container_name: buzzer_web
    depends_on:
      - php
    ports:
      - "${HTTP_PORT:-8080}:80"
    volumes:
      - ./:/app:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  database_data:
