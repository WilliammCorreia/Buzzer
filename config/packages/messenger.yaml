framework:
    messenger:
        failure_transport: failed

        transports:
            # Asynchronous transport backed by the Doctrine/PostgreSQL database.
            async:
                dsn: '%env(MESSENGER_TRANSPORT_DSN)%'
                retry_strategy:
                    max_retries: 3
                    delay: 1000
                    multiplier: 2
            failed: 'doctrine://default?queue_name=failed'
            sync: 'sync://'

        routing:
            # Heavy settlement work is processed asynchronously.
            App\Message\SettleGameMessage: async

when@test:
    framework:
        messenger:
            transports:
                # In tests, handle messages in-memory (no worker, no DB table).
                async: 'in-memory://'
                failed: 'in-memory://'
