server {
    listen 80;
    server_name _;
    root /app/public;

    location / {
        # try to serve file directly, fallback to index.php
        try_files $uri /index.php$is_args$args;
    }

    location ~ ^/index\.php(/|$) {
        fastcgi_pass php:9000;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;

        fastcgi_param SCRIPT_FILENAME /app/public$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT /app/public;

        # Prevents URIs that include the front controller from being passed
        # through. Remove the internal directive to allow URIs like
        # /index.php/some-path/.
        internal;
    }

    # Return 404 for all other php files not matching the front controller.
    location ~ \.php$ {
        return 404;
    }

    client_max_body_size 16m;

    error_log /var/log/nginx/buzzer_error.log;
    access_log /var/log/nginx/buzzer_access.log;
}
