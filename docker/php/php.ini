; Application PHP settings (loaded last, overrides defaults)
date.timezone = Europe/Paris
memory_limit = 256M

; Sensible dev error reporting; production should set display_errors = Off
display_errors = On
error_reporting = E_ALL

; OPcache
; validate_timestamps = 0: OPcache trusts its compiled bytecode and never
; re-stats source files. On a Docker bind mount (notably Docker Desktop on
; Windows/macOS) the per-request stat() storm over the host<->container FS is the
; dominant cost — turning it off cuts page time from several seconds to sub-second.
; Trade-off: code edits are NOT picked up until OPcache is reset. To reload after
; editing PHP: `docker compose restart php` (or `docker compose exec php kill -USR2 1`).
opcache.enable = 1
opcache.enable_cli = 0
opcache.validate_timestamps = 0
opcache.revalidate_freq = 0
opcache.memory_consumption = 256
opcache.max_accelerated_files = 20000
opcache.interned_strings_buffer = 16

; Uploads / form posts
post_max_size = 16M
upload_max_filesize = 16M

; Larger realpath cache further reduces path lookups over the bind mount.
realpath_cache_size = 8M
realpath_cache_ttl = 600
