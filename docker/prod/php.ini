; Production PHP settings (loaded last, overrides defaults).
date.timezone = Europe/Paris
memory_limit = 256M

; Never leak a stack trace to a visitor: errors go to the container logs,
; which Monolog already forwards to stderr.
display_errors = Off
display_startup_errors = Off
log_errors = On
error_log = /proc/self/fd/2
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT
expose_php = Off

; OPcache. The source code is baked into the image and never changes at
; runtime, so revalidation is pure overhead.
opcache.enable = 1
opcache.enable_cli = 0
opcache.validate_timestamps = 0
opcache.memory_consumption = 256
opcache.max_accelerated_files = 20000
opcache.interned_strings_buffer = 16

; Uploads / form posts
post_max_size = 16M
upload_max_filesize = 16M

realpath_cache_size = 8M
realpath_cache_ttl = 600

; Sessions are handled by Symfony; harden the cookie regardless.
session.cookie_httponly = 1
session.cookie_samesite = Lax
session.use_strict_mode = 1
